<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="navbar">
            <div class="navlogo border">
                <div class="logo"></div>
            </div>
            <div class="address border">
                <p class="add-first">Deliver to</p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-sec"><b>Pakistan</b></p>
                </div>
            </div>
            <div class="nav-search">
                <select class="search-select search-border">
                    <option class="select-main">All Departments</option>
                    <option>Arts & Crafts </option>
                    <option>Automotive</option>
                    <option>Baby</option>
                    <option>Beauty & Personal Care</option>
                    <option>Books</option>
                    <option>Boy's Fasion</option>
                    <option>Computers</option>
                    <option>Deals</option>
                    <option>Digital Music</option>
                    <option>Electronics</option>
                    <option>Girl's Fashion</option>
                    <option>Health & Household</option>
                    <option>Home & Kitchen</option>
                    <option>Industrial & Sceintific</option>
                    <option>Kindle Store</option>
                    <option>Luggage</option>
                </select>
                <input class="search-input search-border" type="text" placeholder="Search Amazon">
                <button class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div class="nav-language border" >
                <i class="fa-solid fa-globe"></i>
                 <select class="lang-select">
                    <option selected><b>UN</b></option>
                    <option>EN</option>
                     <option>UR</option>
                </select>
            </div>
            <div class="nav-signin border">
                <p class="sign"><span>Hello, sign in</span></p>
                <p class="acc">Account & Lists</p>
            </div>
             <div class="nav-orders border">
                <p class="return"><span>Returns</span></p>
                <p class="order">& Orders</p>
            </div>
            <div class="nav-cart border">
                <i class="fa-solid fa-cart-arrow-down"></i>
                <p class="cart">Cart</p>
            </div>
        </div>

        <div class="panel">
            <div class="all border">
                <i class="fa-solid fa-bars"></i>
                <p>All</p>
            </div>
            <div class="menu">
                <p class="border">Today's Deals</p>
                <p class="border">Gift Cards</p>
                <p class="border">Sell</p>
                <p class="border">Registry</p>
                <p class="border">Prime Video</p>
                <p class="border">Customer Service</p>
            </div>
            <div class="offer border">
                Shop Deals in Electronics
            </div>
        </div>
    </header>

    <div class="main-section"></div>
</body>
</html>
